spring:
  application:
    name: taskmanager

  datasource:
    url: jdbc:h2:mem:taskmanagerdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: c3ByaW5nYm9vdDQtdGFza2Zsb3ctand0LXNlY3JldC1rZXktMjAyNi1wcm9kdWN0aW9uLWdyYWRl
    expiration: 86400000
